name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Quality gates (check:all)
        run: bun run check:all

      - name: Run tests (CI reporter)
        run: bun run test:ci

      - name: Test timing summary
        if: always()
        run: bun run report:test-timing >> "$GITHUB_STEP_SUMMARY"

      - name: Code-quality metrics summary
        if: always()
        run: bun run report:quality >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test timing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-junit
          path: junit.xml
          if-no-files-found: warn

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bun-test-coverage
          path: coverage/lcov.info
          if-no-files-found: warn
